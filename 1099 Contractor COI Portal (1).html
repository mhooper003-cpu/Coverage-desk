  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"1d30c31e-ef36-40f0-9c5a-5cfb5db413dd\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<!-- @template name=\"COI Compliance\" description=\"A contractor certificate-of-insurance portal — upload/status view for 1099 contractors, and an admin compliance dashboard to track expirations\" -->\n<helmet>\n<script src=\"07eb3625-b46d-47d6-997d-4a087282f1f0\"><\u002Fscript>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:var(--color-bg)\">\n<nav class=\"nav\">\n<span class=\"nav-brand\">Coverage Desk<\u002Fspan>\n<div class=\"seg\" role=\"radiogroup\" aria-label=\"View\" style=\"margin-left:auto\">\n<label class=\"seg-opt\"><input type=\"radio\" name=\"role\" checked=\"{{ isContractor }}\" sc-camel-on-change=\"{{ pickContractor }}\">Contractor<\u002Flabel>\n<label class=\"seg-opt\"><input type=\"radio\" name=\"role\" checked=\"{{ isAdmin }}\" sc-camel-on-change=\"{{ pickAdmin }}\">Admin<\u002Flabel>\n<\u002Fdiv>\n<\u002Fnav>\n<div style=\"max-width:1080px;margin:0 auto;padding:var(--space-6) var(--space-4) var(--space-10)\">\n\n<sc-if value=\"{{ isContractor }}\" hint-placeholder-val=\"{{ true }}\">\n<div>\n<p class=\"tag tag-neutral\" style=\"margin:0 0 var(--space-2)\">Signed in as {{ me.name }} · {{ me.trade }}<\u002Fp>\n<h1 style=\"font-family:var(--font-heading);font-weight:var(--font-heading-weight);font-size:34px;margin:0 0 var(--space-1)\">Your certificate of insurance<\u002Fh1>\n<p style=\"font-family:var(--font-body);font-size:15.5px;color:var(--color-neutral-700);max-width:60ch;margin:0 0 var(--space-6)\">Keep an active certificate on file so we can keep paying you without interruption. We'll email a reminder before yours lapses.<\u002Fp>\n\n<div class=\"card elev-sm\" style=\"margin-bottom:var(--space-4)\">\n<div class=\"card-kicker\">Current coverage<\u002Fdiv>\n<div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-4);flex-wrap:wrap\">\n<div>\n<div class=\"card-title\">{{ me.policyType }} · {{ me.carrier }}<\u002Fdiv>\n<p class=\"card-body\">Coverage limit {{ me.limitLabel }}. Policy on file expires {{ me.expiresLabel }}.<\u002Fp>\n<\u002Fdiv>\n<span class=\"tag {{ me.tagClass }}\">{{ me.statusLabel }}<\u002Fspan>\n<\u002Fdiv>\n<div class=\"card-meta\">{{ me.helperText }}<\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"display:flex;gap:var(--space-3);margin-bottom:var(--space-6)\">\n<button type=\"button\" class=\"btn btn-primary\" sc-camel-on-click=\"{{ openUpload }}\">Upload new certificate<svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m12 5 7 7-7 7\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n<button type=\"button\" class=\"btn btn-ghost\">Contact compliance<\u002Fbutton>\n<\u002Fdiv>\n\n<hr class=\"hr\">\n\n<div style=\"margin-top:var(--space-6)\">\n<div class=\"card-kicker\" style=\"margin-bottom:var(--space-3)\">Upload history<\u002Fdiv>\n<sc-raw-table class=\"table\">\n<sc-raw-thead><sc-raw-tr><sc-raw-th>Uploaded<\u002Fsc-raw-th><sc-raw-th>Policy<\u002Fsc-raw-th><sc-raw-th>Expires<\u002Fsc-raw-th><sc-raw-th>Status<\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n<sc-raw-tbody>\n<sc-for list=\"{{ me.history }}\" as=\"h\" hint-placeholder-count=\"3\">\n<sc-raw-tr><sc-raw-td>{{ h.uploaded }}<\u002Fsc-raw-td><sc-raw-td>{{ h.policyType }}<\u002Fsc-raw-td><sc-raw-td>{{ h.expires }}<\u002Fsc-raw-td><sc-raw-td><span class=\"tag {{ h.tagClass }}\">{{ h.status }}<\u002Fspan><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n<\u002Fsc-for>\n<\u002Fsc-raw-tbody>\n<\u002Fsc-raw-table>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ false }}\">\n<div>\n<h1 style=\"font-family:var(--font-heading);font-weight:var(--font-heading-weight);font-size:34px;margin:0 0 var(--space-1)\">Contractor compliance<\u002Fh1>\n<p style=\"font-family:var(--font-body);font-size:15.5px;color:var(--color-neutral-700);max-width:64ch;margin:0 0 var(--space-6)\">Every 1099 with an open engagement, and whether their certificate of insurance is current.<\u002Fp>\n\n<div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-3);margin-bottom:var(--space-6)\">\n<div class=\"card elev-sm\"><div class=\"card-kicker\">Compliant<\u002Fdiv><div class=\"card-title\" style=\"font-size:32px;font-feature-settings:'tnum' 1\">{{ stats.compliant }}<\u002Fdiv><\u002Fdiv>\n<div class=\"card elev-sm\"><div class=\"card-kicker\">Expiring soon<\u002Fdiv><div class=\"card-title\" style=\"font-size:32px;font-feature-settings:'tnum' 1\">{{ stats.expiring }}<\u002Fdiv><\u002Fdiv>\n<div class=\"card elev-sm\"><div class=\"card-kicker\">Expired<\u002Fdiv><div class=\"card-title\" style=\"font-size:32px;font-feature-settings:'tnum' 1\">{{ stats.expired }}<\u002Fdiv><\u002Fdiv>\n<div class=\"card elev-sm\"><div class=\"card-kicker\">Missing<\u002Fdiv><div class=\"card-title\" style=\"font-size:32px;font-feature-settings:'tnum' 1\">{{ stats.missing }}<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"seg\" role=\"radiogroup\" aria-label=\"Filter\" style=\"margin-bottom:var(--space-4)\">\n<label class=\"seg-opt\"><input type=\"radio\" name=\"filter\" checked=\"{{ filterIsAll }}\" sc-camel-on-change=\"{{ setFilterAll }}\">All<\u002Flabel>\n<label class=\"seg-opt\"><input type=\"radio\" name=\"filter\" checked=\"{{ filterIsExpiring }}\" sc-camel-on-change=\"{{ setFilterExpiring }}\">Expiring soon<\u002Flabel>\n<label class=\"seg-opt\"><input type=\"radio\" name=\"filter\" checked=\"{{ filterIsExpired }}\" sc-camel-on-change=\"{{ setFilterExpired }}\">Expired<\u002Flabel>\n<label class=\"seg-opt\"><input type=\"radio\" name=\"filter\" checked=\"{{ filterIsMissing }}\" sc-camel-on-change=\"{{ setFilterMissing }}\">Missing<\u002Flabel>\n<\u002Fdiv>\n\n<sc-raw-table class=\"table\">\n<sc-raw-thead><sc-raw-tr><sc-raw-th>Contractor<\u002Fsc-raw-th><sc-raw-th>Trade<\u002Fsc-raw-th><sc-raw-th>Policy<\u002Fsc-raw-th><sc-raw-th>Expires<\u002Fsc-raw-th><sc-raw-th>Status<\u002Fsc-raw-th><sc-raw-th><\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n<sc-raw-tbody>\n<sc-for list=\"{{ visibleContractors }}\" as=\"c\" hint-placeholder-count=\"5\">\n<sc-raw-tr><sc-raw-td>{{ c.name }}<\u002Fsc-raw-td><sc-raw-td class=\"text-muted\">{{ c.trade }}<\u002Fsc-raw-td><sc-raw-td class=\"text-muted\">{{ c.policyType }}<\u002Fsc-raw-td><sc-raw-td class=\"text-muted\">{{ c.expiresLabel }}<\u002Fsc-raw-td><sc-raw-td><span class=\"tag {{ c.tagClass }}\">{{ c.statusLabel }}<\u002Fspan><\u002Fsc-raw-td><sc-raw-td><button type=\"button\" class=\"btn btn-secondary\" sc-camel-on-click=\"{{ c.openReview }}\">Review<\u002Fbutton><\u002Fsc-raw-td><\u002Fsc-raw-tr>\n<\u002Fsc-for>\n<\u002Fsc-raw-tbody>\n<\u002Fsc-raw-table>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n\n<sc-if value=\"{{ uploadOpen }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"dialog-backdrop\">\n<div class=\"dialog\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"upload-title\">\n<div class=\"dialog-title\" id=\"upload-title\">{{ uploadTitle }}<\u002Fdiv>\n<div class=\"dialog-body\">\n<div style=\"display:grid;gap:var(--space-3)\">\n<div class=\"field\"><label for=\"f-policy\">Policy type<\u002Flabel><input class=\"input\" id=\"f-policy\" value=\"{{ form.policyType }}\" sc-camel-on-change=\"{{ form.setPolicyType }}\"><\u002Fdiv>\n<div class=\"field\"><label for=\"f-carrier\">Carrier<\u002Flabel><input class=\"input\" id=\"f-carrier\" value=\"{{ form.carrier }}\" sc-camel-on-change=\"{{ form.setCarrier }}\"><\u002Fdiv>\n<div class=\"field\"><label for=\"f-limit\">Coverage limit<\u002Flabel><input class=\"input\" id=\"f-limit\" value=\"{{ form.limit }}\" sc-camel-on-change=\"{{ form.setLimit }}\"><\u002Fdiv>\n<div class=\"field\"><label for=\"f-expires\">Expiration date<\u002Flabel><input class=\"input\" id=\"f-expires\" type=\"date\" value=\"{{ form.expires }}\" sc-camel-on-change=\"{{ form.setExpires }}\"><\u002Fdiv>\n<div class=\"field\"><label for=\"f-file\">Certificate file (PDF)<\u002Flabel><input class=\"input\" id=\"f-file\" type=\"file\" sc-camel-on-change=\"{{ form.setFile }}\"><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"dialog-actions\">\n<button type=\"button\" class=\"btn btn-secondary\" sc-camel-on-click=\"{{ closeUpload }}\">Cancel<\u002Fbutton>\n<button type=\"button\" class=\"btn btn-primary\" sc-camel-on-click=\"{{ submitUpload }}\">Submit for review<\u002Fbutton>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ reviewOpen }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"dialog-backdrop\">\n<div class=\"dialog\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"review-title\">\n<div class=\"dialog-title\" id=\"review-title\">{{ reviewing.name }}<\u002Fdiv>\n<div class=\"dialog-body\">\n<p style=\"margin:0 0 var(--space-3)\">{{ reviewing.trade }} · {{ reviewing.policyType }} · {{ reviewing.carrier }}<\u002Fp>\n<p style=\"margin:0 0 var(--space-3)\">Coverage limit {{ reviewing.limitLabel }}. Expires {{ reviewing.expiresLabel }}.<\u002Fp>\n<p style=\"margin:0\"><span class=\"tag {{ reviewing.tagClass }}\">{{ reviewing.statusLabel }}<\u002Fspan><\u002Fp>\n<\u002Fdiv>\n<div class=\"dialog-actions\">\n<button type=\"button\" class=\"btn btn-secondary\" sc-camel-on-click=\"{{ closeReview }}\">Close<\u002Fbutton>\n<button type=\"button\" class=\"btn btn-ghost\" sc-camel-on-click=\"{{ requestNew }}\">Request new certificate<\u002Fbutton>\n<button type=\"button\" class=\"btn btn-ghost\" sc-camel-on-click=\"{{ uploadForReviewing }}\">Upload certificate<\u002Fbutton>\n<button type=\"button\" class=\"btn btn-primary\" sc-camel-on-click=\"{{ markCompliant }}\">Mark compliant<\u002Fbutton>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst TODAY = new Date('2026-07-20');\n\nfunction daysUntil(dateStr) {\n  const d = new Date(dateStr);\n  return Math.round((d - TODAY) / 86400000);\n}\nfunction fmtDate(dateStr) {\n  return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });\n}\nfunction statusFor(dateStr) {\n  if (!dateStr) return { key: 'missing', label: 'No certificate on file', tagClass: 'tag-accent' };\n  const days = daysUntil(dateStr);\n  if (days < 0) return { key: 'expired', label: 'Expired', tagClass: 'tag-accent' };\n  if (days <= 45) return { key: 'expiring', label: 'Expiring soon', tagClass: 'tag-outline' };\n  return { key: 'compliant', label: 'Compliant', tagClass: 'tag-neutral' };\n}\n\nclass Component extends DCLogic {\n  state = {\n    role: 'contractor',\n    filter: 'all',\n    uploadOpen: false,\n    uploadTargetId: null,\n    reviewId: null,\n    form: { policyType: 'General Liability', carrier: '', limit: '$1,000,000', expires: '', file: '' },\n    contractors: [\n      { id: 1, name: 'Maria Gonzalez', trade: 'Electrician', policyType: 'General Liability', carrier: 'Acme Mutual', limit: '$1,000,000', expires: '2027-03-10' },\n      { id: 2, name: 'David Chen', trade: 'Plumbing', policyType: 'General Liability', carrier: 'Harbor Insurance', limit: '$2,000,000', expires: '2026-08-05' },\n      { id: 3, name: 'Aisha Bello', trade: 'HVAC', policyType: 'General Liability + Auto', carrier: 'Continental', limit: '$1,000,000', expires: '2026-07-02' },\n      { id: 4, name: 'Tom Reilly', trade: 'Drywall', policyType: 'General Liability', carrier: 'Northfield', limit: '$500,000', expires: '2026-09-30' },\n      { id: 5, name: 'Priya Nair', trade: 'Painting', policyType: 'General Liability', carrier: 'Coastal', limit: '$1,000,000', expires: '' },\n      { id: 6, name: 'Jamal Carter', trade: 'Landscaping', policyType: 'General Liability', carrier: 'Meridian', limit: '$1,000,000', expires: '2026-07-28' },\n      { id: 7, name: \"Sam O'Brien\", trade: 'General Labor', policyType: 'General Liability', carrier: 'Anchor', limit: '$1,000,000', expires: '2028-01-01' }\n    ]\n  };\n\n  decorate(c) {\n    const s = statusFor(c.expires);\n    return {\n      ...c,\n      limitLabel: c.limit,\n      expiresLabel: c.expires ? fmtDate(c.expires) : '—',\n      statusLabel: s.label,\n      tagClass: s.tagClass,\n      statusKey: s.key,\n      openReview: () => this.setState({ reviewId: c.id })\n    };\n  }\n\n  renderVals() {\n    const contractors = this.state.contractors.map((c) => this.decorate(c));\n    const stats = {\n      compliant: contractors.filter((c) => c.statusKey === 'compliant').length,\n      expiring: contractors.filter((c) => c.statusKey === 'expiring').length,\n      expired: contractors.filter((c) => c.statusKey === 'expired').length,\n      missing: contractors.filter((c) => c.statusKey === 'missing').length\n    };\n    const visibleContractors = this.state.filter === 'all' ? contractors : contractors.filter((c) => c.statusKey === this.state.filter);\n\n    const meRaw = this.state.contractors.find((c) => c.id === 6);\n    const me = this.decorate(meRaw);\n    me.helperText = me.statusKey === 'expiring' ? `Your certificate expires in ${daysUntil(meRaw.expires)} days — upload a renewal to stay eligible for payment.`\n      : me.statusKey === 'expired' ? 'Your certificate has expired. Upload a current one to resume payment.'\n      : me.statusKey === 'missing' ? 'We don\\u2019t have a certificate on file yet.'\n      : 'You\\u2019re all set — nothing due right now.';\n    me.history = [\n      { uploaded: 'Jul 2, 2025', policyType: me.policyType, expires: fmtDate('2026-07-28'), status: 'Compliant', tagClass: 'tag-neutral' },\n      { uploaded: 'Jun 28, 2024', policyType: me.policyType, expires: 'Jul 2, 2025', status: 'Superseded', tagClass: 'tag-outline' }\n    ];\n\n    const reviewing = this.state.reviewId ? this.decorate(this.state.contractors.find((c) => c.id === this.state.reviewId)) : null;\n    const uploadTarget = this.state.uploadTargetId ? this.state.contractors.find((c) => c.id === this.state.uploadTargetId) : null;\n\n    return {\n      isContractor: this.state.role === 'contractor',\n      isAdmin: this.state.role === 'admin',\n      pickContractor: () => this.setState({ role: 'contractor' }),\n      pickAdmin: () => this.setState({ role: 'admin' }),\n      me,\n      stats,\n      visibleContractors,\n      filterIsAll: this.state.filter === 'all',\n      filterIsExpiring: this.state.filter === 'expiring',\n      filterIsExpired: this.state.filter === 'expired',\n      filterIsMissing: this.state.filter === 'missing',\n      setFilterAll: () => this.setState({ filter: 'all' }),\n      setFilterExpiring: () => this.setState({ filter: 'expiring' }),\n      setFilterExpired: () => this.setState({ filter: 'expired' }),\n      setFilterMissing: () => this.setState({ filter: 'missing' }),\n      uploadOpen: this.state.uploadOpen,\n      uploadTitle: uploadTarget ? `Upload certificate for ${uploadTarget.name}` : 'Upload certificate of insurance',\n      openUpload: () => this.setState({ uploadOpen: true, uploadTargetId: 6, form: { policyType: 'General Liability', carrier: '', limit: '$1,000,000', expires: '', file: '' } }),\n      openUploadForContractor: (id) => {\n        const c = this.state.contractors.find((x) => x.id === id);\n        this.setState({ uploadOpen: true, reviewId: null, uploadTargetId: id, form: { policyType: c.policyType || 'General Liability', carrier: c.carrier || '', limit: c.limit || '$1,000,000', expires: '', file: '' } });\n      },\n      closeUpload: () => this.setState({ uploadOpen: false }),\n      form: {\n        policyType: this.state.form.policyType,\n        carrier: this.state.form.carrier,\n        limit: this.state.form.limit,\n        expires: this.state.form.expires,\n        setPolicyType: (e) => this.setState({ form: { ...this.state.form, policyType: e.target.value } }),\n        setCarrier: (e) => this.setState({ form: { ...this.state.form, carrier: e.target.value } }),\n        setLimit: (e) => this.setState({ form: { ...this.state.form, limit: e.target.value } }),\n        setExpires: (e) => this.setState({ form: { ...this.state.form, expires: e.target.value } }),\n        setFile: (e) => this.setState({ form: { ...this.state.form, file: e.target.value } })\n      },\n      submitUpload: () => {\n        const f = this.state.form;\n        const targetId = this.state.uploadTargetId;\n        this.setState((s) => ({\n          uploadOpen: false,\n          uploadTargetId: null,\n          contractors: s.contractors.map((c) => c.id === targetId ? { ...c, policyType: f.policyType || c.policyType, carrier: f.carrier || c.carrier, limit: f.limit || c.limit, expires: f.expires || c.expires } : c)\n        }));\n      },\n      reviewOpen: !!reviewing,\n      reviewing: reviewing || {},\n      closeReview: () => this.setState({ reviewId: null }),\n      uploadForReviewing: () => this.setState({ uploadOpen: true, reviewId: null, uploadTargetId: reviewing.id, form: { policyType: reviewing.policyType || 'General Liability', carrier: reviewing.carrier || '', limit: reviewing.limit || '$1,000,000', expires: '', file: '' } }),\n      requestNew: () => this.setState({ reviewId: null }),\n      markCompliant: () => {\n        const id = this.state.reviewId;\n        this.setState((s) => ({\n          reviewId: null,\n          contractors: s.contractors.map((c) => c.id === id ? { ...c, expires: '2027-07-20' } : c)\n        }));\n      }\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
